<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>고뚜리맵 Pro - 통합 로또 분석 플랫폼</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=91e72a0e9fe0a1997477a496093aa81b&libraries=services,clusterer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 추가된 UI를 위한 인라인 CSS (기존 style.css에 합쳐도 됩니다) */
        .prize-info { font-size: 0.8rem; color: #94A3B8; margin-top: 5px; text-align: right; }
        .prize-info b { color: #F59E0B; font-size: 0.95rem; }
        .stats-panel { width: 100%; max-width: 400px; margin-top: 20px; }
        .stats-header { font-size: 1rem; color: #F8FAFC; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
        .stats-row { display: flex; align-items: center; margin-bottom: 10px; }
        .stats-label { width: 60px; font-size: 0.8rem; color: #94A3B8; }
        .stats-balls { flex: 1; display: flex; gap: 6px; overflow-x: auto; padding-bottom: 5px; }
        .stats-balls::-webkit-scrollbar { height: 4px; }
        .stats-balls::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .popup-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-left: 6px; vertical-align: middle; }
        .badge-open { background: #10B981; color: white; }
        .badge-closed { background: #EF4444; color: white; }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-clover" style="color: #F59E0B;"></i>
            <span>GotturiMap Pro</span>
        </div>
        <div id="data-status-badge" class="status-badge loading">
            <i class="fa-solid fa-circle-notch fa-spin"></i> 확인중
        </div>
    </header>

    <div class="top-info-banner">
        <div class="banner-left">
            <div class="next-draw-title">제 <b id="banner-next-round">----</b>회 추첨까지</div>
            <div class="countdown-timer" id="banner-countdown">0일 00:00:00 남음</div>
        </div>
        <div class="banner-right">
            <div class="latest-draw-title"><span id="banner-latest-round">----</span>회 당첨결과</div>
            <div class="latest-balls-mini" id="banner-latest-balls">
                </div>
            <div class="prize-info">1등 예상금: <b id="banner-prize">집계중</b></div>
        </div>
    </div>

    <main class="app-content">
        <section id="view-map" class="view-section active">
            <div id="map" class="kakao-map-container"></div>
            <div class="map-overlay-panel">
                <button id="btn-my-location" class="overlay-btn" aria-label="내 위치">
                    <i class="fa-solid fa-location-crosshairs"></i>
                </button>
                <div class="map-legend">
                    <div class="legend-item"><span class="icon-marker tier-3"></span> 10회 이상</div>
                    <div class="legend-item"><span class="icon-marker tier-2"></span> 5회 이상</div>
                    <div class="legend-item"><span class="icon-marker tier-1"></span> 1회 이상</div>
                </div>
            </div>
        </section>

        <section id="view-predict" class="view-section hidden">
            <div class="predict-container">
                <div class="advanced-control-panel">
                    <div class="control-group">
                        <label>게임 수 (1~5게임)</label>
                        <select id="game-count">
                            <option value="5">5게임 (5,000원)</option>
                            <option value="4">4게임 (4,000원)</option>
                            <option value="3">3게임 (3,000원)</option>
                            <option value="2">2게임 (2,000원)</option>
                            <option value="1">1게임 (1,000원)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>분석 알고리즘</label>
                        <select id="algo-base">
                            <option value="balanced">⚖️ 역대 누적 균형 (추천)</option>
                            <option value="recent_trend">🔥 최근 트렌드 (다출현)</option>
                            <option value="hot_cold">☯️ 핫앤콜드 (다출현+소출현)</option>
                            <option value="random">🌀 완전 자동 (랜덤)</option>
                        </select>
                    </div>
                    <button id="btn-generate-advanced" class="primary-btn advanced-generate-btn">
                        <i class="fa-solid fa-receipt"></i> 번호 추출 및 영수증 발급
                    </button>
                </div>

                <div id="ticket-paper" class="ticket-paper" style="display: none;">
                    <div class="ticket-header">
                        <h2>로또 6/45</h2>
                        <div class="ticket-dates">
                            <p>발행일: <span id="t-issue"></span></p>
                            <p>추첨일: <span id="t-draw"></span> <span class="draw-no">제 <b id="t-draw-no"></b> 회</span></p>
                        </div>
                        <div class="dashed-line"></div>
                    </div>
                    <div class="ticket-body" id="ticket-lines"></div>
                    <div class="ticket-footer">
                        <div class="dashed-line"></div>
                        <div class="price-row"><span>금액</span><span id="t-price">₩5,000</span></div>
                        <p class="barcode-mock">||| |||| || ||| ||||| |||| || |</p>
                    </div>
                </div>
                <button id="btn-download" class="secondary-btn" style="display: none;">
                    <i class="fa-solid fa-download"></i> 영수증 이미지로 저장
                </button>

                <div class="stats-panel neumorphic-card">
                    <div class="stats-header">
                        <span><i class="fa-solid fa-chart-simple"></i> 누적 출현 통계 (보너스 제외)</span>
                    </div>
                    <div class="stats-row">
                        <div class="stats-label">HOT (Top5)</div>
                        <div class="stats-balls" id="stats-hot-balls"></div>
                    </div>
                    <div class="stats-row">
                        <div class="stats-label">COLD (Bot5)</div>
                        <div class="stats-balls" id="stats-cold-balls"></div>
                    </div>
                </div>

            </div>
        </section>

        <section id="view-history" class="view-section hidden">
            <div class="history-container">
                <div class="history-list-wrapper neumorphic-card">
                    <div class="history-list-header">
                        <div class="col-draw-no">회차</div>
                        <div class="col-numbers">당첨 번호</div>
                        <div class="col-bonus">보너스</div>
                    </div>
                    <div id="history-list-content" class="history-list-content"></div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" data-target="view-map"><i class="fa-solid fa-map-location-dot"></i><span>명당 지도</span></a>
        <a href="#" class="nav-item" data-target="view-predict"><i class="fa-solid fa-receipt"></i><span>번호 예측</span></a>
        <a href="#" class="nav-item" data-target="view-history"><i class="fa-solid fa-list-ol"></i><span>역대 당첨</span></a>
    </nav>

    <script src="./lotto_history_data.js"></script>
    <script src="./lotto_data.js"></script>
    <script src="./predict.js"></script>
    <script src="./app.js"></script>
</body>
</html>
