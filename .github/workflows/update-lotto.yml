# 파일명: .github/workflows/update-lotto.yml
# 경로: lotto_data/.github/workflows/update-lotto.yml

name: Update Lotto Data

on:
  schedule:
    - cron: '0 13 * * 6'
  workflow_dispatch:

# [핵심 추가] 깃허브 액션 구동 환경을 최신(Node.js 24)으로 강제 설정하여 경고 메시지 제거
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필요한 파이썬 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 파이썬 업데이트 스크립트 실행
        run: python update_data.py

      - name: 변경된 .js 파일들 깃허브에 자동 저장 (Commit & Push)
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add lotto_data.js lotto_history_data.js
          git commit -m "Auto-update lotto data by Python" || echo "No changes to commit"
          git push origin main
