# 파일명: .github/workflows/update-lotto.yml
# 경로: lotto_data/.github/workflows/update-lotto.yml

name: Update Lotto Data

on:
  schedule:
    - cron: '0 13 * * 6'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # [핵심 변경] 깃허브 액션 봇에게 파일 쓰기(저장) 권한 부여
    permissions:
      contents: write
      
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요한 파이썬 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 파이썬 업데이트 스크립트 실행
        run: python update_data.py

      - name: 변경된 .js 파일들 깃허브에 자동 저장 (Commit & Push)
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add lotto_data.js lotto_history_data.js
          git commit -m "Auto-update lotto data by Python" || echo "No changes to commit"
          # [핵심 변경] main 브랜치로 명확하게 푸시(저장) 타겟팅
          git push origin main
