# 파일명: update-lotto.yml
# 경로: .github/workflows/update-lotto.yml

name: Update Lotto Data

on:
  schedule:
    # 주말에 기사가 늦게 뜨는 것을 대비해 6시간마다 확인합니다.
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 환경 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 필요한 라이브러리 설치 (axios, cheerio)
        run: |
          npm install axios cheerio

      - name: 자바스크립트 업데이트 스크립트 실행
        run: node update_data.js

      - name: 변경된 .js 파일들 깃허브에 자동 저장 (Commit & Push)
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add lotto_data.js lotto_history_data.js
          git commit -m "Auto-update lotto data by Node.js" || echo "No changes to commit"
          git push origin main
